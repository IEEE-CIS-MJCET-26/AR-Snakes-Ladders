<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0" />
      <stop offset="100%" stop-color="#00d9f5" />
    </linearGradient>
  </defs>
  
  <!-- Background circle so it looks good on both light and dark themes -->
  <circle cx="60" cy="60" r="60" fill="#02040a" />

  <!-- Outer rings -->
  <circle cx="60" cy="60" r="50" stroke="url(#lg1)" stroke-width="8" opacity="0.9" />
  <circle cx="60" cy="60" r="35" stroke="url(#lg1)" stroke-width="4" opacity="0.4" />
  
  <!-- Compass Points -->
  <polygon points="60,15 68,45 60,53 52,45" fill="url(#lg1)" />
  <polygon points="60,105 52,75 60,67 68,75" fill="url(#lg1)" opacity="0.4" />
  
  <!-- Center marker -->
  <circle cx="60" cy="60" r="8" fill="url(#lg1)" />
  <circle cx="60" cy="60" r="3" fill="#ffffff" />
</svg>